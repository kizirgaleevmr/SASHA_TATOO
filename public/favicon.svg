<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <style>
      .needle { fill: #000; }
      .ink { fill: #8B0000; }
      .shadow { fill: #333; opacity: 0.3; }
    </style>
  </defs>
  <!-- Shadow -->
  <ellipse cx="16" cy="28" rx="8" ry="2" class="shadow"/>
  <!-- Needle body -->
  <rect x="14" y="8" width="4" height="16" class="needle"/>
  <!-- Needle tip -->
  <polygon points="12,8 20,8 16,4" class="needle"/>
  <!-- Ink drop -->
  <ellipse cx="16" cy="10" rx="1.5" ry="2" class="ink"/>
  <!-- Handle -->
  <rect x="13" y="20" width="6" height="4" rx="1" class="needle"/>
</svg>